name: Lint & Quality Check

on:
  push:
    branches: [main]

jobs:
  lint:
    name: HTML · CSS · Accessibility · Links
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      #1. HTML VALIDITY
      - name: Validate HTML (W3C)
        uses: Cyb3r-Jak3/html5validator-action@v7.2.0
        with:
          root: .
          css: false
          format: text

      # 2. CSS VALIDITY
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install stylelint
        run: npm install -g stylelint stylelint-config-standard

      - name: Write stylelint config
        run: |
          cat > .stylelintrc.json << 'EOF'
          {
            "extends": "stylelint-config-standard",
            "rules": {
              "no-descending-specificity": null,
              "alpha-value-notation": null,
              "color-function-notation": null,
              "color-function-alias-notation": null,
              "color-hex-length": null,
              "declaration-block-single-line-max-declarations": null,
              "keyframes-name-pattern": null,
              "media-feature-range-notation": null
            }
          }
          EOF

      - name: Extract inline CSS and lint
        run: |
          node - << 'EOF'
          const fs = require('fs');
          const html = fs.readFileSync('index.html', 'utf8');
          const match = html.match(/<style[^>]*>([\s\S]*?)<\/style>/i);
          if (match) {
            fs.writeFileSync('_extracted.css', match[1]);
            console.log('CSS extracted successfully');
          } else {
            console.log('No inline <style> block found');
            fs.writeFileSync('_extracted.css', '');
          }
          EOF
          stylelint _extracted.css --allow-empty-input
          rm -f _extracted.css

      #3. ACCESSIBILITY (axe-core, no browser needed)
      - name: Install axe-core CLI
        run: npm install -g @axe-core/cli

      - name: Run axe accessibility check
        run: |
          axe index.html \
            --exit \
            --tags wcag2a,wcag2aa

      #4. BROKEN LINKS
      - name: Check broken links (lychee)
        uses: lycheeverse/lychee-action@v1
        with:
          args: >
            --verbose
            --no-progress
            --exclude "mailto:"
            --exclude "localhost"
            --timeout 20
            ./index.html
          fail: true
